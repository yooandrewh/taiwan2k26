<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FPC BEST Children’s Camp · Name Tags</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,system-ui,"Segoe UI",Arial,sans-serif;background:#e9e9e6;color:#111;}
  /* ---- Screen-only toolbar ---- */
  .toolbar{position:sticky;top:0;z-index:10;background:#0d9488;color:#fff;padding:12px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 2px 6px rgba(0,0,0,.2);}
  .toolbar h1{font-size:16px;font-weight:800;}
  .toolbar .info{font-size:13px;opacity:.92;}
  .toolbar .spacer{flex:1;}
  .toolbar button{background:#fff;color:#0d9488;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:800;cursor:pointer;}
  .toolbar label{font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;}
  .hint{background:#fff8e1;border-bottom:1px solid #f0e2a8;color:#6b5900;font-size:12.5px;padding:8px 16px;line-height:1.5;}

  /* ---- Sheet / tags ---- */
  .sheet{padding:0.35in;display:flex;flex-wrap:wrap;gap:0;justify-content:flex-start;max-width:8.27in;margin:16px auto;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.15);}
  .tag{width:3.5in;height:2.5in;box-sizing:border-box;border:1px dashed #c4c4c4;padding:0.16in 0.18in;display:flex;flex-direction:column;position:relative;overflow:hidden;background:#fff;}
  .tag .top{position:absolute;left:0;top:0;height:0.32in;width:100%;}
  .tag .row{display:flex;align-items:center;justify-content:space-between;margin-top:0.16in;}
  .grp{font-size:12pt;font-weight:800;color:#fff;border-radius:6px;padding:2px 10px;letter-spacing:.02em;}
  .amark{display:inline-flex;align-items:center;justify-content:center;width:0.26in;height:0.26in;border:2px solid #dc2626;color:#dc2626;border-radius:50%;font-weight:900;font-size:12pt;line-height:1;font-family:Georgia,serif;}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2px 2px 0;}
  .name{font-weight:800;line-height:1.05;color:#111;}
  .grade{margin-top:5px;font-size:12.5pt;font-weight:700;color:#444;}
  .grade.role{color:#0d9488;text-transform:uppercase;letter-spacing:.04em;font-size:11pt;}
  .aller-txt{margin-top:auto;text-align:center;font-size:8.5pt;font-weight:700;color:#b91c1c;line-height:1.2;}
  .foot{margin-top:5px;text-align:center;font-size:7.5pt;color:#aaa;letter-spacing:.03em;text-transform:uppercase;}

  @media print{
    @page{size:A4 portrait;margin:0.35in;}
    body{background:#fff;}
    .toolbar,.hint{display:none;}
    .sheet{box-shadow:none;margin:0;padding:0;max-width:none;gap:0;}
    .tag{border:1px dashed #ccc;page-break-inside:avoid;}
  }
</style>
</head>
<body>
<div class="toolbar">
  <h1>FPC BEST Children’s Camp · Name Tags</h1>
  <span class="info" id="count"></span>
  <span class="spacer"></span>
  <label><input type="checkbox" id="cutlines" checked> Cut guides</label>
  <button onclick="window.print()">🖨️ Print</button>
</div>
<div class="hint">
  <b>Printing:</b> 3.5″×2.5″ tags, 8 per A4 page. In the print dialog set <b>Scale 100%</b> (not "Fit"), <b>Margins: Default</b>, and enable <b>Background graphics</b> so the colors print. Tags are grouped by group for easy sorting.
</div>
<div class="sheet" id="sheet"></div>

<script>
const VBS_SG={
  boys:[
    {id:"B1",leads:[{name:"Caleb Su",role:"L"},{name:"Roba",role:"V"}],
     kids:[{name:"Hao-Chen Li",g:6},{name:"Ezra",g:6},{name:"Zephyr Kao",g:5},{name:"Harry",g:5},{name:"Jeremy",g:5},{name:"Mike",g:4}]},
    {id:"B2",leads:[{name:"Jean Kim",role:"L"},{name:"Timothy Kim",role:"V"}],
     kids:[{name:"Ryan Lin",g:4},{name:"Patrick",g:4},{name:"Wayne",g:4},{name:"Len",g:4},{name:"Atlas Kao",g:4}]},
    {id:"B3",leads:[{name:"Andrew Back",role:"L"},{name:"Ethan Nam",role:"V"}],
     kids:[{name:"Levi",g:4},{name:"Paul",g:4},{name:"Meek Lo",g:4},{name:"Jacob Yang",g:3},{name:"Ansel",g:3},{name:"Richard Hsia",g:3}]},
    {id:"B4",leads:[{name:"Rubin Jang",role:"L"},{name:"Lane Hartshorne",role:"V"}],
     kids:[{name:"Freddie",g:2},{name:"Liam Chang",g:2},{name:"Alvin Fu",g:2},{name:"Mumu Hu",g:2},{name:"Jeremiah",g:1},{name:"Caleb Guo",g:1}]},
    {id:"B5",leads:[{name:"Owen Lee",role:"L"},{name:"Owen Nam",role:"V"},{name:"Owen Wu",role:"V"}],
     kids:[{name:"Dylan Lin",g:1},{name:"Yann Chiu",g:1},{name:"Oli",g:1},{name:"Daniel Hu",g:0},{name:"Elijah Kwok",g:0},{name:"Sunny",g:0},{name:"Asher",g:0}]}
  ],
  girls:[
    {id:"G1",leads:[{name:"Esther Yang",role:"L"}],
     kids:[{name:"Est-elle",g:7},{name:"Hsin Hsin",g:6},{name:"Claire",g:6},{name:"Grace Hartshorne",g:6},{name:"Eliana Wan",g:6}]},
    {id:"G2",leads:[{name:"Becca Park",role:"L"}],
     kids:[{name:"Ruhamah",g:6},{name:"Queenie",g:6},{name:"Yuqi Chiu",g:5},{name:"Amber Yang",g:5}]},
    {id:"G3",leads:[{name:"Jane Kim",role:"L"}],
     kids:[{name:"Adeline",g:5},{name:"Ellery",g:5},{name:"Kara",g:4},{name:"Grace",g:4},{name:"Stephanie",g:4}]},
    {id:"G4",leads:[{name:"Sammy Taing",role:"L"}],
     kids:[{name:"Poppy Lo",g:4},{name:"Doughnuts",g:4},{name:"Freja",g:3},{name:"Hannah Jiang",g:3},{name:"Jessie Hu",g:3}]},
    {id:"G5",leads:[{name:"Irene Song",role:"L"}],
     kids:[{name:"Doris",g:3},{name:"Jyshelle Pak",g:3},{name:"Emmeline",g:2},{name:"Celia",g:2},{name:"Dorcas Chen",g:2}]},
    {id:"G6",leads:[{name:"Janet Phee",role:"L"}],
     kids:[{name:"Olivia",g:1},{name:"Yu-Chen Li",g:1},{name:"Avery Nam",g:1},{name:"Gemma Benson",g:1}]},
    {id:"G7",leads:[{name:"Grace Yoon",role:"L"}],
     kids:[{name:"Riley",g:1},{name:"Elonnie Pak",g:1},{name:"Deborah Lo",g:0},{name:"Papillon Lo",g:0},{name:"Abigail Guo",g:-1}]}
  ]
};

// Known allergies / dietary notes (keyed by name). Add more as they come in.
const ALLERGIES={
  "Queenie":"No shellfish / shrimp",
  "Patrick":"No beef",
  "Jyshelle Pak":"Less sugar please",
  "Zephyr Kao":"Heat rash (feet)"
};

// Distinct color per group for easy sorting into piles.
const GRP_COLOR={
  B1:"#1d4ed8",B2:"#0284c7",B3:"#0891b2",B4:"#0d9488",B5:"#4f46e5",
  G1:"#be123c",G2:"#db2777",G3:"#c026d3",G4:"#ea580c",G5:"#d97706",G6:"#65a30d",G7:"#0d9488"
};

function grLabel(g){
  if(g===-1)return "Pre-K";
  if(g===0)return "Kindergarten";
  if(g===1)return "1st Grade";
  if(g===2)return "2nd Grade";
  if(g===3)return "3rd Grade";
  return g+"th Grade";
}
function esc(s){return (s+"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}

function tagHTML(person,grpId){
  var color=GRP_COLOR[grpId]||"#0d9488";
  var allergy=ALLERGIES[person.name];
  var gradeLine=person.role
    ? '<div class="grade role">'+(person.role==="V"?"Volunteer":"Leader")+'</div>'
    : '<div class="grade">'+grLabel(person.g)+'</div>';
  return '<div class="tag">'
    +'<div class="top" style="background:'+color+'"></div>'
    +'<div class="row"><span class="grp" style="background:'+color+'">Group '+grpId+'</span>'
      +(allergy?'<span class="amark" title="Allergy">!</span>':'<span></span>')+'</div>'
    +'<div class="center"><div class="name" data-fit>'+esc(person.name)+'</div>'+gradeLine+'</div>'
    +(allergy?'<div class="aller-txt">! '+esc(allergy)+'</div>':'')
    +'<div class="foot">FPC BEST Children’s Camp</div>'
    +'</div>';
}

function render(){
  var html="",n=0;
  ["boys","girls"].forEach(function(side){
    VBS_SG[side].forEach(function(grp){
      grp.leads.forEach(function(l){html+=tagHTML(l,grp.id);n++;});
      grp.kids.forEach(function(k){html+=tagHTML(k,grp.id);n++;});
    });
  });
  document.getElementById("sheet").innerHTML=html;
  document.getElementById("count").textContent=n+" tags · "+Math.ceil(n/8)+" A4 pages";
  fitNames();
}

// Shrink long names so they never overflow the 3.5in tag width.
function fitNames(){
  document.querySelectorAll('.name[data-fit]').forEach(function(el){
    var size=30; el.style.fontSize=size+'pt';
    while(el.scrollWidth>el.clientWidth && size>13){size-=1;el.style.fontSize=size+'pt';}
  });
}

document.getElementById('cutlines').addEventListener('change',function(e){
  document.querySelectorAll('.tag').forEach(function(t){t.style.border=e.target.checked?'1px dashed #c4c4c4':'1px solid transparent';});
});

render();
window.addEventListener('resize',fitNames);
</script>
</body>
</html>
